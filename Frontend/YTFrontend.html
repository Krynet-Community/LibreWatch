<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LibreWatch</title>
<style>
body { 
  font-family: sans-serif; 
  background: #111; 
  color: #eee; 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  padding: 2rem; 
}
#player { 
  width: 640px; 
  max-width: 95vw; 
  height: 360px; 
  margin-top: 1rem;
  background: #222;
  border-radius: 8px;
}
input, button { 
  padding: .75rem; 
  margin: .25rem; 
  font-size: 1rem;
  border: 1px solid #444;
  border-radius: 4px;
  background: #333;
  color: #eee;
}
input:focus { outline: none; border-color: #666; }
button { cursor: pointer; background: #4a5568; }
button:hover { background: #5a67d8; }
button:disabled { opacity: 0.5; cursor: not-allowed; }
.status {
  margin: 1rem 0;
  padding: 0.5rem;
  border-radius: 4px;
  font-size: 0.9rem;
}
.status.success { background: #2d5a2d; }
.status.error { background: #5a2d2d; }
.status.loading { background: #4a5568; }
</style>
</head>
<body>

<h1>🛡️ LibreWatch</h1>
<div>
  <input id="videoInput" value="dQw4w9WgXcQ" placeholder="YouTube URL or ID">
  <button id="loadBtn">▶️ Load</button>
</div>
<div id="status" class="status" style="display: none;"></div>
<div id="player"></div>

<!-- FIXED: Correct script order -->
<script src="/LibreWatch/Player/playerCore.js"></script>
<script src="/LibreWatch/Player/youtubePlayer.js"></script>
