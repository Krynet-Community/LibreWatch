<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LibreWatch</title>

<style>
:root {
  --bg: #111;
  --panel: #1a1a1a;
  --text: #eee;
  --muted: #888;
  --accent: #5a67d8;
  --danger: #ff5a5a;
  --ok: #3bb273;
}

body {
  margin: 0;
  font-family: sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem;
}

h1 { margin-bottom: 1rem; }

.card {
  background: var(--panel);
  padding: 1rem;
  border-radius: 10px;
  display: flex;
  gap: .5rem;
  align-items: center;
}

input {
  padding: .75rem;
  font-size: 1rem;
  border-radius: 6px;
  border: 1px solid #333;
  background: #222;
  color: var(--text);
  width: 280px;
}

input:focus {
  outline: none;
  border-color: var(--accent);
}

button {
  padding: .75rem 1rem;
  border-radius: 6px;
  border: none;
  background: var(--accent);
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover { opacity: 0.9; }
button:disabled { opacity: 0.5; cursor: not-allowed; }

#player {
  width: 720px;
  max-width: 95vw;
  height: 400px;
  margin-top: 1.5rem;
  background: #000;
  border-radius: 12px;
  overflow: hidden;
}

#status {
  margin-top: 1rem;
  font-size: 0.9rem;
  color: var(--muted);
  min-height: 20px;
}

.status-ok { color: var(--ok); }
.status-error { color: var(--danger); }
.status-loading { color: var(--accent); }
</style>
</head>

<body>

<h1>🛡️ LibreWatch</h1>

<div class="card">
  <input id="videoInput" value="dQw4w9WgXcQ" placeholder="YouTube URL or ID">
  <button id="loadBtn">Load</button>
</div>

<div id="status"></div>
<div id="player"></div>

<!-- deps -->
<script src="/LibreWatch/Player/playerCore.js"></script>
<script src="/LibreWatch/Player/youtubePlayer.js"></script>
<script src="/LibreWatch/Player/extract.js"></script>

<script>
/* =========================
   APP CONTROLLER
========================= */

const App = (() => {
  const el = {
    input: document.getElementById('videoInput'),
    btn: document.getElementById('loadBtn'),
    status: document.getElementById('status'),
    player: document.getElementById('player')
  };

  let busy = false;

  function setStatus(msg, type = '') {
    el.status.textContent = msg;
    el.status.className = type;
  }

  function setLoading(state) {
    busy = state;
    el.btn.disabled = state;
    el.btn.textContent = state ? 'Loading...' : 'Load';
  }

  function safeExtract(input) {
    if (URLNUKE.extractVideoID) {
      throw new Error('Extractor not loaded');
    }

    const id = URLNUKE.extractVideoID(input);
    if (!id) throw new Error('Invalid video ID');

    return id;
  }

  async function loadVideo() {
    if (busy) return;

    const raw = el.input.value.trim();

    try {
      setLoading(true);
      setStatus('Extracting video ID...', 'status-loading');

      const id = safeExtract(raw);

      setStatus('Loading player...', 'status-loading');

      if (!window.LibreWatchPlayer?.create) {
        throw new Error('Player not loaded');
      }

      await window.LibreWatchPlayer.create('player', id, {
        autoplay: 1
      });

      setStatus(`Loaded: ${id}`, 'status-ok');

    } catch (err) {
      console.error(err);
      setStatus(err.message, 'status-error');
      el.player.innerHTML = '<div style="color:#888;padding:1rem;">Failed to load</div>';

    } finally {
      setLoading(false);
    }
  }

  function bindEvents() {
    el.btn.addEventListener('click', loadVideo);

    el.input.addEventListener('keypress', e => {
      if (e.key === 'Enter') loadVideo();
    });

    el.input.addEventListener('drop', e => {
      e.preventDefault();
      const text = e.dataTransfer.getData('text/plain');
      el.input.value = text;
      loadVideo();
    });

    el.input.addEventListener('dragover', e => e.preventDefault());
  }

  function init() {
    setStatus('Ready', 'status-ok');
    bindEvents();
  }

  return { init };
})();

/* =========================
   BOOT
========================= */

window.addEventListener('load', () => {
  App.init();
});
</script>

</body>
</html>
