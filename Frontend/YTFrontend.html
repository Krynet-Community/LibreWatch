<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LibreWatch</title>

<style>
:root {
  --bg: #111;
  --panel: #1a1a1a;
  --text: #eee;
  --muted: #888;
  --accent: #5a67d8;
  --danger: #ff5a5a;
  --ok: #3bb273;
}

body {
  margin: 0;
  font-family: sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem;
}

h1 { margin-bottom: 1rem; }

.card {
  background: var(--panel);
  padding: 1rem;
  border-radius: 10px;
  display: flex;
  gap: .5rem;
  align-items: center;
}

input {
  padding: .75rem;
  font-size: 1rem;
  border-radius: 6px;
  border: 1px solid #333;
  background: #222;
  color: var(--text);
  width: 280px;
}

input:focus {
  outline: none;
  border-color: var(--accent);
}

button {
  padding: .75rem 1rem;
  border-radius: 6px;
  border: none;
  background: var(--accent);
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover { opacity: 0.9; }
button:disabled { opacity: 0.5; cursor: not-allowed; }

#player {
  width: 720px;
  max-width: 95vw;
  height: 400px;
  margin-top: 1.5rem;
  background: #000;
  border-radius: 12px;
  overflow: hidden;
}

#status {
  margin-top: 1rem;
  font-size: 0.9rem;
  color: var(--muted);
  min-height: 20px;
}

.status-ok { color: var(--ok); }
.status-error { color: var(--danger); }
.status-loading { color: var(--accent); }
</style>
</head>

<body>

<h1>🛡️ LibreWatch</h1>

<div class="card">
  <input id="videoInput" value="dQw4w9WgXcQ" placeholder="YouTube URL or ID">
  <button id="loadBtn">Load</button>
</div>

<div id="status"></div>
<div id="player"></div>

<!-- deps -->
<script src="/LibreWatch/Player/playerCore.js"></script>
<script src="/LibreWatch/Player/youtubePlayer.js"></script>
<script src="/LibreWatch/Player/extract.js"></script>

<script>
  const btn = document.getElementById('loadBtn');
  const input = document.getElementById('videoInput');
  const status = document.getElementById('status');
  const playerDiv = document.getElementById('player');

  function setStatus(message, type = 'loading') {
    status.textContent = message;
    status.className = `status ${type}`;
    status.style.display = 'block';

    if (type === 'success' || type === 'error') {
      setTimeout(() => status.style.display = 'none', 3000);
    }
  }

  btn.addEventListener('click', async () => {
    const raw = input.value.trim();
    btn.disabled = true;
    btn.textContent = '⏳ Loading...';

    setStatus('Extracting video ID...', 'loading');

    try {
      const id = URLNUKE.extractVideoID(raw);
      if (!id) throw new Error('Invalid video ID');

      setStatus('Loading player...', 'loading');

      await window.LibreWatchPlayer.create('player', id, {
        autoplay: 1
      });

      setStatus(`✅ Loaded! (${id})`, 'success');

    } catch (error) {
      console.error('Load failed:', error);
      setStatus(`❌ ${error.message}`, 'error');
      playerDiv.innerHTML =
        '<div style="padding:1rem;color:#888;">Failed to load player</div>';

    } finally {
      btn.disabled = false;
      btn.textContent = '▶️ Load';
    }
  });

  input.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') btn.click();
  });

  window.addEventListener('load', () => {
    setStatus('🚀 Ready! Click Load to play with SponsorBlock.', 'success');
    setTimeout(() => status.style.display = 'none', 2000);
  });

  input.addEventListener('drop', (e) => {
    e.preventDefault();
    const url =
      e.dataTransfer.getData('text/uri-list') ||
      e.dataTransfer.getData('text/plain');

    input.value = url;
    btn.click();
  });

  input.addEventListener('dragover', (e) => e.preventDefault());
</script>

</body>
</html>
